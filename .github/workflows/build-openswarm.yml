name: Build OpenSwarm Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bake into the binary (e.g. 1.0.1). Leave blank to use agentswarm-cli package version."
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        working-directory: packages/opencode
        run: bun install

      - name: Build binary
        working-directory: packages/opencode
        env:
          OPENSWARM_VERSION: ${{ steps.version.outputs.value }}
        run: bun run script/build.ts --single --skip-install

      - name: Rename binary (Unix)
        if: matrix.platform != 'windows'
        run: |
          mv packages/opencode/dist/agentswarm-cli-${{ matrix.platform }}-${{ matrix.arch }}/bin/agentswarm \
             agentswarm-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Rename binary (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Move-Item packages/opencode/dist/agentswarm-cli-${{ matrix.platform }}-${{ matrix.arch }}/bin/agentswarm.exe `
            agentswarm-${{ matrix.platform }}-${{ matrix.arch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentswarm-${{ matrix.platform }}-${{ matrix.arch }}
          path: agentswarm-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.platform == 'windows' && '.exe' || '' }}
          if-no-files-found: error
